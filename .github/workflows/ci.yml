name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r router/requirements.txt
          pip install ruff pytest black

      - name: Lint with Ruff
        run: ruff check router/

      - name: Format check with Black
        run: black --check router/

      - name: Run tests
        run: |
          # ถ้ามี test จริงให้รัน pytest
          echo "✅ No tests yet - placeholder"
          # pytest -v

      - name: Build Docker image
        run: docker compose -f docker-compose.production.yml build --no-cache router
